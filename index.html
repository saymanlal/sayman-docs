<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAYMAN Documentation</title>
<link rel="icon" href="/public/sayman-logo.png" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/style.css">
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-theme');
      }
    })();
  </script>
<link rel="stylesheet" href="/docs.css">
</head>
<body>

<div class="container">
  <!-- ── Header ── -->
  <header class="header">
    <div class="header-left">
      <button class="mobile-menu-toggle" onclick="toggleSidebar()" aria-label="Open menu">
        <i class="fas fa-bars"></i>
      </button>
      <a href="/" class="logo-link">
        <img src="/public/sayman-logo.png" alt="SAYMAN Logo" class="logo">
      </a>
      <div>
        <div class="title-row">
          <h1>SAYMAN <span class="badge">Docs</span></h1>
        </div>
        <div class="header-subtitle">Civic Intelligence & Multi-Layer Web3 Platform</div>
      </div>
    </div>
    
    <div class="header-right">
      <div class="header-status-group">
        <div class="status-item">
          <span class="status-dot"></span>
          <span id="header-network">Loading...</span>
        </div>
        <div class="status-item mono" id="header-chain">—</div>
      </div>
      <div class="header-actions">
        <button class="action-btn" id="themeToggleBtn" onclick="toggleExplorerTheme()" title="Toggle Theme">
          <i class="fas fa-moon"></i>
        </button>
        <a href="https://github.com/saymanlal/SAYMAN" target="_blank" rel="noopener" class="action-btn" title="GitHub">
          <i class="fab fa-github"></i>
        </a>
        <a href="https://puky.vercel.app/" target="_blank" rel="noopener" class="action-btn" title="Wallet">
          <i class="fas fa-wallet"></i>
        </a>
      </div>
    </div>
  </header>

  <div class="docs-wrapper">

    <!-- ── Sidebar ── -->
    <aside class="docs-sidebar" id="docsSidebar">

      <div class="sidebar-header">
        <a href="/" class="sidebar-logo">
          <img src="/public/sayman-logo.png" alt="SAYMAN">
          SAYMAN Docs
        </a>
        <button class="sidebar-close" onclick="toggleSidebar()" aria-label="Close menu">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <div class="sidebar-search">
        <div class="search-wrapper">
          <i class="fas fa-search search-icon"></i>
          <input
            type="text"
            id="docsSearch"
            placeholder="Search docs... (Ctrl+K)"
            oninput="searchDocs()"
            autocomplete="off"
          >
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <!-- populated by renderSidebar() in docs.js -->
      </nav>

    </aside>

    <!-- ── Main content ── -->
    <main class="docs-main">
      <div class="docs-content" id="docsContent">
        <!-- populated by renderContent() in docs.js -->
      </div>
    </main>

    <!-- ── Table of contents ── -->
    <aside class="docs-toc">
      <div class="toc-header">On this page</div>
      <nav class="toc-nav" id="tocNav">
        <!-- populated by updateTOC() in docs.js -->
      </nav>
    </aside>

  </div>

  <!-- ── Footer ── -->
  <footer>
    <span>© 2026 SAYMAN Blockchain · By <a href="https://vizkusgroups.me" target="_blank" rel="noopener">Vizkus Groups</a> · 
      <a href="#" onclick="event.preventDefault();showLegalModal('copyright')">Copyright</a> · 
      <a href="#" onclick="event.preventDefault();showLegalModal('terms')">Terms</a> · 
      <a href="#" onclick="event.preventDefault();showLegalModal('privacy')">Privacy</a> · 
      <a href="#" onclick="event.preventDefault();showLegalModal('cookies')">Cookies</a>
    </span>
    <span class="footer-links">
      <a href="https://github.com/saymanlal/SAYMAN" target="_blank" rel="noopener"><i class="fab fa-github"></i> GitHub</a>
      <a href="https://puky.vercel.app/" target="_blank" rel="noopener"><i class="fas fa-wallet"></i> Wallet</a>
      <a href="https://sayman-faucet-site.vercel.app/" target="_blank" rel="noopener"><i class="fas fa-tint"></i> Faucet</a>
    </span>
  </footer>
</div>

<script src="/docs.js"></script>
</body>
</html>
